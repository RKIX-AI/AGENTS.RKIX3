<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RKIX3 — Mobile AI Workspace</title>
  <meta name="description" content="RKIX3 mobile-first AI workspace for coding, build automation, projects, library, and smart assistant workflows." />
  <style>
    :root {
      color-scheme: dark;
      --bg: #020711;
      --panel: rgba(4, 15, 31, .72);
      --panel-strong: rgba(6, 24, 50, .9);
      --line: rgba(39, 143, 255, .28);
      --line-soft: rgba(255, 255, 255, .08);
      --text: #f7fbff;
      --muted: #a9b8cc;
      --faint: #6f7e93;
      --blue: #126cff;
      --cyan: #16c8ff;
      --glow: 0 0 34px rgba(18, 108, 255, .34);
      --radius: 16px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    html { background: var(--bg); }
    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 16%, rgba(18,108,255,.28), transparent 21rem),
        radial-gradient(circle at 12% 8%, rgba(22,200,255,.16), transparent 18rem),
        linear-gradient(145deg, #020711 0%, #020915 48%, #00040a 100%);
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      z-index: -2;
      pointer-events: none;
      opacity: .34;
      background-image:
        linear-gradient(115deg, transparent 0 18%, rgba(18,108,255,.18) 18.2%, transparent 18.6% 42%, rgba(18,108,255,.12) 42.2%, transparent 42.7%),
        linear-gradient(rgba(22,200,255,.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(22,200,255,.08) 1px, transparent 1px);
      background-size: 240px 180px, 42px 42px, 42px 42px;
      mask-image: radial-gradient(circle at 50% 24%, #000 0 38%, transparent 76%);
    }
    body::after {
      content: "";
      position: fixed;
      inset: auto -20% -28% -20%;
      height: 48vh;
      z-index: -1;
      background: radial-gradient(circle, rgba(18,108,255,.18), transparent 66%);
      filter: blur(18px);
    }

    button, input { font: inherit; }
    button { cursor: pointer; }
    img { max-width: 100%; display: block; }
    h1, h2, h3, p { margin-top: 0; }

    .app { min-height: 100vh; }
    .mobile-shell { width: min(100%, 460px); margin: 0 auto; min-height: 100vh; padding: 18px 16px 92px; }
    .topbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; min-height: 48px; }
    .icon-button, .send-button, .prompt-tool {
      border: 1px solid var(--line-soft);
      color: var(--text);
      background: rgba(9, 20, 38, .72);
      display: inline-grid;
      place-items: center;
      transition: .18s ease;
    }
    .icon-button { width: 42px; height: 42px; border-radius: 12px; }
    .icon-button:hover, .prompt-tool:hover, .send-button:hover { border-color: var(--cyan); box-shadow: var(--glow); transform: translateY(-1px); }
    .login-button {
      border: 1px solid rgba(18,108,255,.75);
      border-radius: 15px;
      color: white;
      background: linear-gradient(135deg, #1375ff, #0048c8);
      box-shadow: 0 12px 28px rgba(18,108,255,.28);
      padding: 11px 19px;
      font-weight: 800;
    }

    .hero { display: grid; gap: 16px; justify-items: center; padding: 12px 0 16px; text-align: center; }
    .hero-logo { width: min(88vw, 360px); filter: brightness(2.7) contrast(1.45) saturate(1.25) drop-shadow(0 0 30px rgba(22,200,255,.5)); }
    .hero h1 { margin: -2px 0 0; color: #fff; text-shadow: 0 0 22px rgba(255,255,255,.2); font-size: clamp(25px, 6.4vw, 32px); line-height: 1.12; letter-spacing: -.03em; }
    .hero-subtitle { margin: 0; color: #c7d6e8; font-size: 14px; line-height: 1.55; }

    .prompt-card {
      width: 100%;
      border: 1px solid rgba(18,108,255,.82);
      border-radius: 22px;
      background: linear-gradient(145deg, rgba(4,18,39,.84), rgba(2,9,22,.92));
      box-shadow: 0 0 0 1px rgba(22,200,255,.08), 0 20px 70px rgba(0,0,0,.36), var(--glow);
      padding: 13px;
    }
    .chat { max-height: 168px; overflow: auto; display: grid; gap: 10px; margin-bottom: 10px; text-align: left; }
    .bubble { width: fit-content; max-width: 88%; border: 1px solid var(--line-soft); border-radius: 14px; padding: 10px 12px; background: rgba(255,255,255,.045); color: #d7e5f5; font-size: 13px; line-height: 1.45; }
    .bubble.user { justify-self: end; color: #eef8ff; border-color: rgba(22,200,255,.35); background: rgba(18,108,255,.18); }
    .prompt-row { display: grid; grid-template-columns: 42px 1fr 42px 42px; gap: 8px; align-items: center; }
    .prompt-tool { width: 42px; height: 42px; border-radius: 13px; color: var(--muted); }
    input {
      width: 100%;
      min-width: 0;
      border: 0;
      outline: 0;
      color: var(--text);
      background: transparent;
      font-size: 15px;
    }
    input::placeholder { color: #8f9db0; }
    .send-button { width: 42px; height: 42px; border-radius: 14px; border-color: rgba(18,108,255,.72); background: linear-gradient(135deg, #177aff, #0750d9); box-shadow: 0 12px 26px rgba(18,108,255,.3); }

    .quick-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 10px; margin-top: 16px; }
    .quick-card {
      min-height: 124px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--text);
      background: linear-gradient(145deg, rgba(5,20,42,.78), rgba(2,9,21,.88));
      box-shadow: inset 0 1px 0 rgba(255,255,255,.04), 0 18px 42px rgba(0,0,0,.28);
      padding: 14px 12px;
      display: grid;
      align-content: center;
      justify-items: center;
      gap: 8px;
      text-align: center;
      transition: .18s ease;
    }
    .quick-card:hover, .quick-card.active { border-color: rgba(22,200,255,.86); box-shadow: var(--glow); transform: translateY(-2px); }
    .quick-card svg, .nav-btn svg, .drawer-link svg { color: #1da1ff; filter: drop-shadow(0 0 10px rgba(18,108,255,.45)); }
    .quick-card strong { color: #fff; font-size: 15px; }
    .quick-card span { color: #bdcadd; font-size: 12px; line-height: 1.35; }

    .mobile-page { display: none; animation: rise .22s ease both; }
    .mobile-page.active { display: block; }
    @keyframes rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .panel { border: 1px solid var(--line); border-radius: 18px; background: var(--panel); padding: 16px; box-shadow: 0 20px 54px rgba(0,0,0,.24); }
    .section-title { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin: 18px 0 10px; }
    .section-title h2 { margin: 0; font-size: 18px; }
    .muted { color: var(--muted); }
    .list { display: grid; gap: 10px; }
    .list-item { border: 1px solid var(--line-soft); border-radius: 14px; background: rgba(255,255,255,.035); padding: 12px; display: flex; justify-content: space-between; gap: 12px; align-items: center; }
    .status-dot { width: 9px; height: 9px; border-radius: 3px; background: var(--cyan); box-shadow: 0 0 14px var(--cyan); }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 25;
      width: min(100%, 460px);
      transform: translateX(-50%);
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      padding: 8px 10px max(8px, env(safe-area-inset-bottom));
      border-top: 1px solid rgba(39,143,255,.2);
      background: rgba(2, 8, 19, .88);
      backdrop-filter: blur(20px);
    }
    .nav-btn { border: 0; color: var(--muted); background: transparent; border-radius: 12px; padding: 7px 3px; display: grid; justify-items: center; gap: 3px; font-size: 10px; }
    .nav-btn.active { color: white; background: rgba(18,108,255,.16); }

    .drawer { position: fixed; inset: 0; z-index: 40; display: none; background: rgba(0,0,0,.62); }
    .drawer.open { display: block; }
    .drawer-panel { width: min(82vw, 320px); min-height: 100%; padding: 22px 14px; border-right: 1px solid rgba(39,143,255,.24); background: linear-gradient(155deg, rgba(4,14,28,.98), rgba(0,5,13,.98)); box-shadow: 26px 0 70px rgba(0,0,0,.5); }
    .drawer-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 18px; }
    .drawer-logo { width: 178px; }
    .drawer-nav { display: grid; gap: 7px; }
    .drawer-link { border: 1px solid transparent; border-radius: 13px; color: var(--text); background: transparent; padding: 12px; display: flex; align-items: center; gap: 12px; text-align: left; }
    .drawer-link.active, .drawer-link:hover { border-color: rgba(18,108,255,.5); background: linear-gradient(90deg, rgba(18,108,255,.34), rgba(18,108,255,.08)); }
    .recent { margin-top: 22px; color: var(--cyan); font-weight: 800; font-size: 13px; }

    .desktop-rail { display: none; }

    @media (min-width: 900px) {
      body { display: grid; place-items: center; padding: 8px; }
      .app { width: min(1180px, 100%); min-height: min(760px, calc(100vh - 16px)); border: 1px solid rgba(255,255,255,.12); border-radius: 22px; overflow: hidden; display: grid; grid-template-columns: 280px 1fr; background: rgba(0,0,0,.18); }
      .desktop-rail { display: flex; flex-direction: column; justify-content: space-between; padding: 24px 12px; border-right: 1px solid rgba(39,143,255,.24); background: rgba(1,9,20,.68); }
      .desktop-rail .drawer-logo { width: 206px; margin: 0 auto 20px; }
      .mobile-shell { width: 100%; max-width: none; min-height: auto; padding: 18px 50px 28px; }
      .topbar .icon-button:first-child { display: none; }
      .hero { padding-top: 40px; }
      .hero-logo { width: min(520px, 72%); }
      .quick-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); max-width: 760px; margin-inline: auto; }
      .bottom-nav { display: none; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="desktop-rail">
      <div>
        <img class="drawer-logo" src="1780136894650-Photoroom.png" alt="RKIX3 Logo" />
        <nav id="sideNav" class="drawer-nav"></nav>
      </div>
      <p class="muted" style="font-size:12px;line-height:1.5">RKIX3 AI · Code · Build · Automate</p>
    </aside>

    <main class="mobile-shell">
      <header class="topbar">
        <button id="mobileMenu" class="icon-button" aria-label="Mở menu"></button>
        <button class="login-button" type="button">Đăng nhập</button>
        <button class="icon-button" aria-label="Tuỳ chọn"></button>
      </header>

      <section id="home" class="mobile-page active"></section>
      <section id="ai" class="mobile-page"></section>
      <section id="workspace" class="mobile-page"></section>
      <section id="code" class="mobile-page"></section>
      <section id="profile" class="mobile-page"></section>
    </main>

    <div id="drawer" class="drawer" aria-hidden="true">
      <div class="drawer-panel">
        <div class="drawer-head">
          <img class="drawer-logo" src="1780136894650-Photoroom.png" alt="RKIX3" />
          <button id="drawerClose" class="icon-button" aria-label="Đóng menu"></button>
        </div>
        <nav id="drawerNav" class="drawer-nav"></nav>
        <p class="recent">Gần đây</p>
        <div class="list">
          <div class="list-item"><span>Mobile AI shell</span><span class="status-dot"></span></div>
          <div class="list-item"><span>Build nhanh giao diện</span><span class="status-dot"></span></div>
        </div>
      </div>
    </div>
    <nav id="bottomNav" class="bottom-nav"></nav>
  </div>

<script>
const icons={menu:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,close:`<svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="m6 6 12 12M18 6 6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,plus:`<svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,mic:`<svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M12 14a4 4 0 0 0 4-4V6a4 4 0 1 0-8 0v4a4 4 0 0 0 4 4Z" stroke="currentColor" stroke-width="1.8"/><path d="M5 10a7 7 0 0 0 14 0M12 17v4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>`,send:`<svg width="21" height="21" viewBox="0 0 24 24" fill="none"><path d="M12 19V5m0 0-6 6m6-6 6 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,home:`<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="m4 11 8-7 8 7v8a1 1 0 0 1-1 1h-5v-6h-4v6H5a1 1 0 0 1-1-1v-8Z" fill="currentColor"/></svg>`,library:`<svg width="25" height="25" viewBox="0 0 24 24" fill="none"><path d="M6 4v16M12 4v16M18 5v14" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/><path d="M4 6c1.4-1.2 2.6-1.2 4 0v12c-1.4-1.2-2.6-1.2-4 0V6Zm6 0c1.4-1.2 2.6-1.2 4 0v12c-1.4-1.2-2.6-1.2-4 0V6Zm6 0c1.4-1.2 2.6-1.2 4 0v12c-1.4-1.2-2.6-1.2-4 0V6Z" stroke="currentColor" stroke-width="1.4"/></svg>`,folder:`<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M3 7.5A2.5 2.5 0 0 1 5.5 5h4l2 2.5h7A2.5 2.5 0 0 1 21 10v7a2.5 2.5 0 0 1-2.5 2.5h-13A2.5 2.5 0 0 1 3 17V7.5Z" stroke="currentColor" stroke-width="1.8"/></svg>`,apps:`<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 5h4v4H5V5Zm10 0h4v4h-4V5ZM5 15h4v4H5v-4Zm10 0h4v4h-4v-4Z" stroke="currentColor" stroke-width="1.8"/></svg>`,gear:`<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z" stroke="currentColor" stroke-width="1.8"/><path d="M19 13.5v-3l-2.1-.5-.8-1.8 1.1-1.9-2.5-1.5-1.5 1.5h-2.1L9.6 4.8 7.1 6.3l1.1 1.9-.8 1.8-2.1.5v3l2.1.5.8 1.8-1.1 1.9 2.5 1.5 1.5-1.5h2.1l1.5 1.5 2.5-1.5-1.1-1.9.8-1.8 2.1-.5Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/></svg>`,code:`<svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="m8 7-5 5 5 5M16 7l5 5-5 5M14 4l-4 16" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg>`,cube:`<svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="m12 3 8 4.5v9L12 21l-8-4.5v-9L12 3Z" stroke="currentColor" stroke-width="1.7"/><path d="M4 7.5 12 12l8-4.5M12 12v9" stroke="currentColor" stroke-width="1.7"/></svg>`,bot:`<svg width="34" height="34" viewBox="0 0 24 24" fill="none"><path d="M8 8h8a4 4 0 0 1 4 4v4a4 4 0 0 1-4 4H8a4 4 0 0 1-4-4v-4a4 4 0 0 1 4-4Z" stroke="currentColor" stroke-width="1.8"/><path d="M12 8V4m-4 9h.01M16 13h.01M9 16h6" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"/></svg>`};
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)], esc=s=>String(s).replace(/[&<>'"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;'}[c]));
const routes=[['home','Trang chủ',icons.home],['ai','Trợ lý',icons.bot],['workspace','Dự án',icons.folder],['code','Code',icons.code],['profile','Cài đặt',icons.gear]];
const quick=[['code','Lập trình','Viết code, debug và tối ưu',icons.code],['workspace','Build','Xây dựng sản phẩm nhanh chóng',icons.cube],['profile','Tự động hoá','Tự động hoá quy trình và công việc',icons.gear],['ai','AI thông minh','Hỗ trợ bởi AI thế hệ mới',icons.bot]];
const entities={messages:[{role:'agent',text:'RKIX3 đã sẵn sàng. Hỏi bất kỳ điều gì để bắt đầu build.'}],projects:[['Nebula Console','Đang build','76%'],['AgentOps CLI','Lên kế hoạch','42%'],['Docs Pulse','Review','88%']]};
function navHTML(){return routes.map(r=>`<button class="nav-btn" data-route="${r[0]}">${r[2]}<span>${r[1]}</span></button>`).join('')}
function drawerHTML(){return [['ai','Đoạn chat mới',icons.code],['home','Tìm kiếm đoạn chat',icons.menu],['code','Thư viện',icons.library],['workspace','Dự án',icons.folder],['profile','Ứng dụng',icons.apps]].map(r=>`<button class="drawer-link" data-route="${r[0]}">${r[2]}<span>${r[1]}</span></button>`).join('')}
function renderChat(){$('#chatLog').innerHTML=entities.messages.map(m=>`<div class="bubble ${m.role==='user'?'user':''}">${esc(m.text)}</div>`).join('')}
function renderHome(){$('#home').innerHTML=`<div class="hero"><img class="hero-logo" src="1780136894650-Photoroom.png" alt="RKIX3 Logo"><h1>Chúng ta nên bắt đầu từ đâu?</h1><p class="hero-subtitle">Lập trình · Code · Build · Tự động hoá trên một giao diện mobile gọn, sáng và nhanh.</p><div class="prompt-card"><div id="chatLog" class="chat"></div><div class="prompt-row"><button class="prompt-tool" aria-label="Thêm ngữ cảnh">${icons.plus}</button><input id="chatInput" placeholder="Hỏi bất kỳ điều gì"><button class="prompt-tool" aria-label="Ghi âm">${icons.mic}</button><button id="sendChat" class="send-button" aria-label="Gửi">${icons.send}</button></div></div></div><div class="quick-grid">${quick.map(q=>`<button class="quick-card" data-route="${q[0]}">${q[3]}<strong>${q[1]}</strong><span>${q[2]}</span></button>`).join('')}</div>`;renderChat()}
function renderAI(){$('#ai').innerHTML=`<div class="section-title"><h2>AI thông minh</h2><span class="muted">Online</span></div><div class="panel"><p class="muted">Tập trung cho mobile trước: prompt nhanh, nút mỏng, icon xanh và layout giống app RKIX3 ban đầu.</p><div class="list"><div class="list-item"><span>Generate code</span><span class="status-dot"></span></div><div class="list-item"><span>Debug issue</span><span class="status-dot"></span></div><div class="list-item"><span>Plan sprint</span><span class="status-dot"></span></div></div></div>`}
function renderWorkspace(){$('#workspace').innerHTML=`<div class="section-title"><h2>Dự án</h2><span class="muted">${entities.projects.length} mục</span></div><div class="list">${entities.projects.map(p=>`<div class="list-item"><div><strong>${p[0]}</strong><p class="muted" style="margin:4px 0 0">${p[1]}</p></div><strong>${p[2]}</strong></div>`).join('')}</div>`}
function renderCode(){$('#code').innerHTML=`<div class="section-title"><h2>Thư viện Code</h2><span class="muted">Snippets</span></div><div class="panel"><pre style="white-space:pre-wrap;margin:0;color:#bfe7ff;line-height:1.65">export async function POST(req) {\n  const { prompt } = await req.json();\n  return Response.json({ output: prompt });\n}</pre></div>`}
function renderProfile(){$('#profile').innerHTML=`<div class="section-title"><h2>Cài đặt</h2><span class="muted">RKIX3</span></div><div class="panel"><div class="list"><div class="list-item"><span>Giao diện mobile-first</span><span class="status-dot"></span></div><div class="list-item"><span>Nút vuông mỏng</span><span class="status-dot"></span></div><div class="list-item"><span>Icon line xanh</span><span class="status-dot"></span></div></div></div>`}
function setRoute(id){const route=routes.find(r=>r[0]===id)||routes[0];$$('.mobile-page').forEach(p=>p.classList.toggle('active',p.id===route[0]));$$('[data-route]').forEach(b=>b.classList.toggle('active',b.dataset.route===route[0]));$('#drawer').classList.remove('open')}
function bind(){document.body.addEventListener('click',e=>{const route=e.target.closest('[data-route]');if(route)setRoute(route.dataset.route);if(e.target.closest('#sendChat')){const input=$('#chatInput');if(!input||!input.value.trim())return;entities.messages.push({role:'user',text:input.value.trim()},{role:'agent',text:'Đã nhận yêu cầu. RKIX3 sẽ chia nhỏ thành code, build, test và deploy.'});input.value='';renderChat();$('#chatLog').scrollTop=$('#chatLog').scrollHeight}});$('#mobileMenu').onclick=()=>$('#drawer').classList.add('open');$('#drawerClose').onclick=()=>$('#drawer').classList.remove('open')}
function init(){document.querySelector('[aria-label="Mở menu"]').innerHTML=icons.menu;document.querySelector('[aria-label="Tuỳ chọn"]').innerHTML=icons.menu;document.querySelector('[aria-label="Đóng menu"]').innerHTML=icons.close;bottomNav.innerHTML=navHTML();sideNav.innerHTML=drawerHTML();drawerNav.innerHTML=drawerHTML();renderHome();renderAI();renderWorkspace();renderCode();renderProfile();bind();setRoute('home')}
init();
</script>
</body>
</html>
